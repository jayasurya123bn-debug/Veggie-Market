<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Veggie Market</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-nav { display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:10px; }
    .admin-tab { padding:10px 20px; border-radius:8px; background:rgba(255,255,255,0.05); color:var(--g300); cursor:pointer; font-weight:500; border:1px solid transparent; }
    .admin-tab.active { background:rgba(167,139,250,0.1); color:#a78bfa; border-color:rgba(167,139,250,0.3); }
    .admin-section { display:none; }
    .admin-section.active { display:block; animation: slideIn 0.3s; }
    
    table { width:100%; border-collapse:collapse; background:rgba(255,255,255,0.02); border-radius:12px; overflow:hidden; }
    th { text-align:left; padding:15px; background:rgba(255,255,255,0.05); color:var(--g300); font-size:13px; font-weight:600; text-transform:uppercase; }
    td { padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; font-size:14px; }
    tr:last-child td { border-bottom:none; }
    .btn-sm { padding:6px 12px; border-radius:6px; font-size:12px; border:none; cursor:pointer; font-weight:500; }
    .btn-danger { background:rgba(244,63,94,0.1); color:var(--rose); border:1px solid rgba(244,63,94,0.3); }
    .btn-success { background:rgba(34,197,94,0.1); color:var(--emerald); border:1px solid rgba(34,197,94,0.3); }
    .btn-warning { background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.3); }
  </style>
</head>
<body style="padding-top:80px; padding-bottom:50px;">

<div class="container reveal">
  <div style="margin-bottom:30px;">
    <h1 style="margin:0; font-size:2rem; font-weight:700;">👑 Admin Panel</h1>
    <p style="color:var(--g400); margin-top:5px;">Manage users, products, and orders</p>
  </div>

  <div class="admin-nav">
    <div class="admin-tab active" onclick="switchTab('users', this)">Users</div>
    <div class="admin-tab" onclick="switchTab('products', this)">Products</div>
    <div class="admin-tab" onclick="switchTab('orders', this)">Orders</div>
  </div>

  <!-- USERS SECTION -->
  <div id="sec-users" class="admin-section active">
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="adminUsers"></tbody>
      </table>
    </div>
  </div>

  <!-- PRODUCTS SECTION -->
  <div id="sec-products" class="admin-section">
    <div style="margin-bottom:15px; text-align:right;">
      <button class="auth-btn" style="width:auto; padding:8px 20px; font-size:13px;" onclick="document.getElementById('addProductForm').style.display='block'">+ Add New Product</button>
    </div>
    
    <div id="addProductForm" style="display:none; background:var(--g800); padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);">
      <h3 style="margin-top:0;">Add Product</h3>
      <form onsubmit="event.preventDefault(); submitProduct(this)" style="display:grid; gap:15px; grid-template-columns:1fr 1fr;">
        <input type="text" name="name" placeholder="Product Name" required class="input-wrapper" style="padding:10px;">
        <input type="number" name="price" placeholder="Price (₹)" required class="input-wrapper" style="padding:10px;">
        <input type="text" name="unit" placeholder="Unit (kg, bunch, piece)" required class="input-wrapper" style="padding:10px;">
        <select name="category" class="input-wrapper" style="padding:10px;" required>
          <option value="vegetables">Vegetables</option>
          <option value="fruits">Fruits</option>
        </select>
        <input type="text" name="image" placeholder="Image URL (https://...)" required class="input-wrapper" style="padding:10px; grid-column:1/-1;">
        <input type="number" name="stock" placeholder="Initial Stock" required class="input-wrapper" style="padding:10px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="checkbox" name="featured" id="featCheck"> <label for="featCheck">Featured</label>
        </div>
        <div style="grid-column:1/-1; display:flex; gap:10px;">
          <button type="submit" class="auth-btn" style="width:auto; padding:10px 20px;">Save Product</button>
          <button type="button" class="auth-btn" style="width:auto; padding:10px 20px; background:transparent; border:1px solid var(--g500);" onclick="document.getElementById('addProductForm').style.display='none'">Cancel</button>
        </div>
      </form>
    </div>

    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price/Unit</th><th>Stock</th><th>Featured</th><th>Actions</th></tr></thead>
        <tbody id="adminProducts"></tbody>
      </table>
    </div>
  </div>

  <!-- ORDERS SECTION -->
  <div id="sec-orders" class="admin-section">
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Order ID</th><th>User ID</th><th>Date</th><th>Total</th><th>Status</th><th>Update Status</th></tr></thead>
        <tbody id="adminOrders"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  // Admin Check
  if (!App.user || !App.user.is_admin) {
    document.body.innerHTML = '<div style="text-align:center; padding:100px; color:var(--rose); font-size:2rem;">⛔ Access Denied</div>';
    setTimeout(() => window.location.href = 'dashboard.html', 2000);
  }

  function switchTab(tabId, el) {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + tabId).classList.add('active');
    el.classList.add('active');
  }

  // --- USERS ---
  function loadUsers() {
    const users = DB.get('users');
    let html = '';
    users.forEach(u => {
      html += `<tr>
        <td>#${u.id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.is_admin ? '<span style="color:#a78bfa;">Admin</span>' : 'Customer'}</td>
        <td>${u.is_banned ? '<span style="color:var(--rose);">Banned</span>' : '<span style="color:var(--emerald);">Active</span>'}</td>
        <td>
          <button class="btn-sm btn-danger" onclick="toggleBan(${u.id}, ${u.is_banned})">${u.is_banned ? 'Unban' : 'Ban'}</button>
        </td>
      </tr>`;
    });
    document.getElementById('adminUsers').innerHTML = html;
  }
  function toggleBan(id, current) {
    if(id == App.user.id) return App.showToast("Cannot ban yourself", "error");
    DB.updateUser(id, { is_banned: current ? 0 : 1 });
    loadUsers();
    App.showToast("User status updated");
  }

  // --- PRODUCTS ---
  function loadProducts() {
    const products = DB.get('products');
    let html = '';
    products.forEach(p => {
      html += `<tr>
        <td><img src="${p.image}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;"></td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>₹${p.price} / ${p.unit}</td>
        <td>${p.stock}</td>
        <td>${p.featured ? '⭐ Yes' : 'No'}</td>
        <td>
          <button class="btn-sm btn-danger" onclick="delProduct(${p.id})">Delete</button>
        </td>
      </tr>`;
    });
    document.getElementById('adminProducts').innerHTML = html;
  }
  function submitProduct(form) {
    DB.addProduct({
      name: form.name.value,
      price: parseFloat(form.price.value),
      unit: form.unit.value,
      category: form.category.value,
      image: form.image.value,
      stock: parseInt(form.stock.value),
      featured: form.featured.checked ? 1 : 0
    });
    form.reset();
    document.getElementById('addProductForm').style.display = 'none';
    loadProducts();
    App.showToast("Product added");
  }
  function delProduct(id) {
    if(confirm("Delete this product?")) {
      DB.deleteProduct(id);
      loadProducts();
      App.showToast("Product deleted");
    }
  }

  // --- ORDERS ---
  function loadOrders() {
    const orders = DB.get('orders').reverse();
    let html = '';
    orders.forEach(o => {
      html += `<tr>
        <td>#${o.id}</td>
        <td>User #${o.user_id}</td>
        <td>${new Date(o.created_at).toLocaleDateString()}</td>
        <td>₹${o.total.toFixed(2)}</td>
        <td><span style="background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px; font-size:12px;">${o.status.toUpperCase()}</span></td>
        <td>
          <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding:5px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:4px;">
            <option value="pending" ${o.status=='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${o.status=='confirmed'?'selected':''}>Confirmed</option>
            <option value="packed" ${o.status=='packed'?'selected':''}>Packed</option>
            <option value="on_the_way" ${o.status=='on_the_way'?'selected':''}>On the way</option>
            <option value="delivered" ${o.status=='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled" ${o.status=='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
      </tr>`;
    });
    document.getElementById('adminOrders').innerHTML = html;
  }
  function updateOrderStatus(id, status) {
    let orders = DB.get('orders');
    let order = orders.find(o => o.id == id);
    if (order) {
      order.status = status;
      DB.set('orders', orders);
      loadOrders();
      App.showToast("Order status updated");
    }
  }

  // Init
  loadUsers();
  loadProducts();
  loadOrders();
</script>

</body>
</html>
