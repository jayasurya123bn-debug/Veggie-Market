<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist - Veggie Market</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-top:80px; padding-bottom:50px;">

<div class="container reveal">
  <div style="margin-bottom:30px;">
    <h1 style="margin:0; font-size:2rem; font-weight:700;">My Wishlist</h1>
    <p style="color:var(--g400); margin-top:5px;">Products you've saved for later</p>
  </div>

  <div class="product-grid" id="wishlistGrid">
    <!-- Rendered by JS -->
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  function renderWishlist() {
    const wishItems = DB.get('wishlist').filter(w => w.user_id == App.user.id);
    const products = DB.get('products');
    
    const grid = document.getElementById('wishlistGrid');
    grid.innerHTML = '';

    if (wishItems.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <div style="font-size:3rem; margin-bottom:15px;">❤️</div>
          <h3>Your wishlist is empty</h3>
          <p>Tap the heart icon on any product to save it here.</p>
          <a href="shop.html" class="auth-btn" style="display:inline-block; width:auto; padding:10px 30px; margin-top:20px; text-decoration:none;">Browse Products</a>
        </div>
      `;
      return;
    }

    wishItems.forEach((w, index) => {
      const p = products.find(prod => prod.id == w.product_id);
      if (!p) return;

      let badges = '';
      if (p.featured) badges += `<span class="pc-flag">✨ Featured</span>`;
      if (p.stock <= 0) badges += `<span class="pc-flag" style="background:#555;">❌ Sold Out</span>`;

      const delay = index * 0.05;

      const card = `
        <div class="product-card reveal" style="animation-delay:${delay}s">
          <div class="pc-img-wrap">
            <img src="${p.image}" class="pc-img" alt="${p.name}">
            ${badges}
            <button class="pc-wish" onclick="removeWish(${p.id}); event.stopPropagation();" title="Remove">❤️</button>
          </div>
          <div class="pc-body">
            <div class="pc-cat">${p.category.toUpperCase()}</div>
            <div class="pc-title">${p.name}</div>
            <div class="pc-price">₹${p.price} <span class="pc-unit">/ ${p.unit}</span></div>
            <button class="pc-btn" ${p.stock <= 0 ? 'disabled' : ''} onclick="addToCart(${p.id})">
              ${p.stock > 0 ? 'Move to Cart 🛒' : 'Out of Stock'}
            </button>
          </div>
        </div>
      `;
      grid.innerHTML += card;
    });
  }

  function removeWish(pid) {
    DB.toggleWishlist(App.user.id, pid);
    renderWishlist();
    App.showToast("Removed from wishlist");
  }

  function addToCart(pid) {
    DB.addToCart(App.user.id, pid);
    removeWish(pid);
    document.querySelector('.nav-container').remove();
    App.renderNavbar('wishlist.html');
  }

  renderWishlist();
</script>

</body>
</html>
