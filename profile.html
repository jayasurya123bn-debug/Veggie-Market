<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile - Veggie Market</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-top:80px; padding-bottom:50px;">

<div class="container reveal">
  <div style="margin-bottom:30px;">
    <h1 style="margin:0; font-size:2rem; font-weight:700;">My Profile</h1>
    <p style="color:var(--g400); margin-top:5px;">Manage your account settings</p>
  </div>

  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px;">
    
    <!-- Profile Info -->
    <div style="background:var(--g800); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:30px;">
      <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; color:var(--g100);">Profile Details</h3>
      <form id="profileForm" onsubmit="event.preventDefault(); updateProfile()">
        <div class="input-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="pName" required style="padding-left:15px;">
          </div>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="pEmail" readonly style="padding-left:15px; background:rgba(255,255,255,0.05); color:var(--g400); cursor:not-allowed;" title="Email cannot be changed">
          </div>
        </div>
        <button type="submit" class="auth-btn">Save Changes</button>
      </form>
    </div>

    <!-- Password Update -->
    <div style="background:var(--g800); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:30px;">
      <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; color:var(--g100);">Change Password</h3>
      <form id="passwordForm" onsubmit="event.preventDefault(); updatePassword()">
        <div class="input-group">
          <label>Current Password</label>
          <div class="input-wrapper">
            <input type="password" id="oldPass" required style="padding-left:15px;">
          </div>
        </div>
        <div class="input-group">
          <label>New Password</label>
          <div class="input-wrapper">
            <input type="password" id="newPass" required style="padding-left:15px;">
          </div>
        </div>
        <div class="input-group">
          <label>Confirm New Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPass" required style="padding-left:15px;">
          </div>
        </div>
        <button type="submit" class="auth-btn" style="background:linear-gradient(135deg, var(--rose), #e11d48);">Update Password</button>
      </form>
    </div>

  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  // Load data
  document.getElementById('pName').value = App.user.name;
  document.getElementById('pEmail').value = App.user.email;

  function updateProfile() {
    const newName = document.getElementById('pName').value;
    if (DB.updateUser(App.user.id, { name: newName })) {
      App.user.name = newName;
      localStorage.setItem('vm_session', JSON.stringify(App.user));
      App.showToast("Profile updated successfully");
      
      // Update navbar
      document.querySelector('.nav-container').remove();
      App.renderNavbar('profile.html');
    }
  }

  function updatePassword() {
    const oldP = document.getElementById('oldPass').value;
    const newP = document.getElementById('newPass').value;
    const confP = document.getElementById('confirmPass').value;

    if (oldP !== App.user.password) {
      App.showToast("Incorrect current password", "error");
      return;
    }
    if (newP !== confP) {
      App.showToast("New passwords do not match", "error");
      return;
    }

    if (DB.updateUser(App.user.id, { password: newP })) {
      App.user.password = newP;
      localStorage.setItem('vm_session', JSON.stringify(App.user));
      App.showToast("Password updated successfully");
      document.getElementById('passwordForm').reset();
    }
  }
</script>

</body>
</html>
